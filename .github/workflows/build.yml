name: Compila con PyInstaller ad ogni Release

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write
  pull-requests: write
  repository-projects: write

jobs:
  build:
    name: Compila su ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: MeetingTimer.exe
            pyinstaller_cmd: pyinstaller --onefile --noconsole --name "MeetingTimer" --icon "logo.png" --clean --collect-all requests --hidden-import=requests --add-data "fe;fe" --add-data "templates.json;." app.py
          
          - os: ubuntu-latest
            artifact_name: MeetingTimer-linux
            pyinstaller_cmd: pyinstaller --onefile --name "MeetingTimer-linux" --icon "logo.png" --clean --collect-all requests --hidden-import=requests --add-data "fe:fe" --add-data "templates.json:." app.py
          
          - os: macos-latest
            artifact_name: MeetingTimer-mac
            pyinstaller_cmd: pyinstaller --onefile --noconsole --name "MeetingTimer-mac" --icon "logo.png" --clean --collect-all requests --hidden-import=requests --add-data "fe:fe" --add-data "templates.json:." app.py

    steps:
    - name: Controlla il codice sorgente
      uses: actions/checkout@v4

    - name: Configura Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # Blocca l'uso di dipendenze vecchie o corrotte nella cache di GitHub

    - name: Installa le dipendenze in modo forzato
      run: |
        python -m pip install --upgrade pip
        # 🚀 Installiamo le dipendenze base
        python -m pip install -r requirements.txt
        # 🎯 Forza Pillow e PyInstaller nell'ambiente corretto usando il modulo python esplicito
        python -m pip install --upgrade pyinstaller pillow

    - name: Verifica Installazione (Log Aggressivo)
      run: |
        python -c "import requests; print('VERIFICA: Requests è installato correttamente nel sistema virtuale!')"
        python -c "from PIL import Image; print('VERIFICA: Pillow (PIL) è installato e pronto per convertire le icone!')"

    - name: Esegui PyInstaller
      run: ${{ matrix.pyinstaller_cmd }}

    - name: Upload del file nella Release di GitHub
      uses: softprops/action-gh-release@v2
      with:
        files: dist/${{ matrix.artifact_name }}
        # 🚀 FORZA GitHub a usare il tag corretto o l'ultimo disponibile
        tag_name: ${{ github.ref_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}