name: Compila con PyInstaller ad ogni Release

on:
  release:
    types: [published] # Il flusso si attiva solo quando pubblichi ufficialmente una release

permissions:
  contents: write
  packages: write
  pull-requests: write
  repository-projects: write

jobs:
  build:
    name: Compila su ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: MeetingTimer.exe
            pyinstaller_cmd: pyinstaller --onefile --noconsole --name "MeetingTimer" --icon "cronometro.ico" --add-data "fe;fe" --add-data "templates.json;." app.py
          
          - os: ubuntu-latest
            artifact_name: MeetingTimer-linux
            pyinstaller_cmd: pyinstaller --onefile --name "MeetingTimer-linux" --icon "cronometro.ico" --add-data "fe:fe" --add-data "templates.json:." app.py
          
          - os: macos-latest
            artifact_name: MeetingTimer-mac
            pyinstaller_cmd: pyinstaller --onefile --noconsole --name "MeetingTimer-mac" --icon "cronometro.ico" --add-data "fe:fe" --add-data "templates.json:." app.py

    steps:
    - name: Controlla il codice sorgente
      uses: actions/checkout@v4

    - name: Configura Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installa le dipendenze
      run: |
        python -m pip install --upgrade pip
        # 🚀 AGGIUNTO 'requests' qui sotto per evitare il crash!
        pip install flask pyinstaller requests

    - name: Scarica Icona Cronometro (.ico reale)
      shell: bash
      run: |
        # Scarica un'icona open-source a forma di timer/cronometro pulita in formato .ico
        curl -L -o cronometro.ico "https://raw.githubusercontent.com/thepracticaldev/dev.to/7f2f6cb00754020c02111c1e6e0d9b54b03657cb/public/favicon.ico" || echo "Icon download failed, moving on"

    - name: Esegui PyInstaller
      run: ${{ matrix.pyinstaller_cmd }}

    - name: Upload del file nella Release di GitHub
      uses: softprops/action-gh-release@v2
      with:
        files: dist/${{ matrix.artifact_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}