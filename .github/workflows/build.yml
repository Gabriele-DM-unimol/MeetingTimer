name: Compila con PyInstaller ad ogni Release

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write
  pull-requests: write
  repository-projects: write

jobs:
  build:
    name: Compila su ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: MeetingTimer.exe
            # Usiamo favicon.ico che su Windows è nativo e sicuro al 100%
            pyinstaller_cmd: pyinstaller --onefile --noconsole --name "MeetingTimer" --icon "favicon.ico" --clean --collect-all requests --collect-all bs4 --hidden-import=requests --hidden-import=bs4 --add-data "fe;fe" --add-data "templates.json;." app.py
          
          - os: ubuntu-latest
            artifact_name: MeetingTimer-linux
            pyinstaller_cmd: pyinstaller --onefile --name "MeetingTimer-linux" --icon "favicon.ico" --clean --collect-all requests --collect-all bs4 --hidden-import=requests --hidden-import=bs4 --add-data "fe:fe" --add-data "templates.json:." app.py
          
          - os: macos-latest
            artifact_name: MeetingTimer-mac
            # Su Mac logo.png o favicon.ico verranno convertiti grazie a Pillow
            pyinstaller_cmd: pyinstaller --onefile --noconsole --name "MeetingTimer-mac" --icon "logo.png" --clean --collect-all requests --collect-all bs4 --hidden-import=requests --hidden-import=bs4 --add-data "fe:fe" --add-data "templates.json:." app.py

    steps:
    - name: Controlla il codice sorgente
      uses: actions/checkout@v4

    - name: Configura Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Installa le dipendenze in modo forzato
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt
        # 🚀 Forziamo l'installazione di beautifulsoup4 (bs4), pyinstaller e pillow nell'ambiente globale
        python -m pip install --upgrade pyinstaller pillow beautifulsoup4

    - name: Verifica Installazione (Log Aggressivo)
      run: |
        python -c "import requests; print('VERIFICA: Requests è installato correttamente!')"
        python -c "import bs4; print('VERIFICA: BeautifulSoup4 (bs4) è installato correttamente!')"
        python -c "from PIL import Image; print('VERIFICA: Pillow (PIL) è pronto per le icone!')"

    - name: Esegui PyInstaller
      run: ${{ matrix.pyinstaller_cmd }}

    - name: Upload del file nella Release di GitHub
      uses: softprops/action-gh-release@v2
      with:
        files: dist/${{ matrix.artifact_name }}
        tag_name: ${{ github.ref_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}