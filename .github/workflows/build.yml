name: Compila con PyInstaller ad ogni Release

on:
  release:
    types: [published] # Il flusso si attiva solo quando pubblichi ufficialmente una release

permissions:
  contents: write
  packages: write
  pull-requests: write
  repository-projects: write

jobs:
  build:
    name: Compila su ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: MeetingTimer.exe
            # 🚀 Aggiunto --hidden-import=requests
            pyinstaller_cmd: pyinstaller --onefile --noconsole --name "MeetingTimer" --icon "favicon.ico" --hidden-import=requests --add-data "fe;fe" --add-data "templates.json;." app.py
          
          - os: ubuntu-latest
            artifact_name: MeetingTimer-linux
            pyinstaller_cmd: pyinstaller --onefile --name "MeetingTimer-linux" --icon "favicon.ico" --hidden-import=requests --add-data "fe:fe" --add-data "templates.json:." app.py
          
          - os: macos-latest
            artifact_name: MeetingTimer-mac
            pyinstaller_cmd: pyinstaller --onefile --noconsole --name "MeetingTimer-mac" --icon "favicon.ico" --hidden-import=requests --add-data "fe:fe" --add-data "templates.json:." app.py

    steps:
    - name: Controlla il codice sorgente
      uses: actions/checkout@v4

    - name: Configura Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installa le dipendenze
      run: |
        python -m pip install --upgrade pip
        pip install flask pyinstaller requests

    - name: Esegui PyInstaller
      run: ${{ matrix.pyinstaller_cmd }}

    - name: Upload del file nella Release di GitHub
      uses: softprops/action-gh-release@v2
      with:
        files: dist/${{ matrix.artifact_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}