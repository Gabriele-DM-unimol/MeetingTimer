<!DOCTYPE html>
<html lang="it">
  <head>
    <title>Timer Client</title>
    <link rel="icon" type="image/x-icon" href="../favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">

    <script type="text/javascript" src="client3.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/sort@3.14.8/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/focus@3.14.8/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <style>
      .font-timer { font-family: 'Oswald', sans-serif; }
      .hide-cursor { cursor: none !important; }
      body { background-color: #0a0a0a; user-select: none; }
    </style>
  </head>
  <body 
    x-data="Object.assign(client(), { 
      getClockObj() {
        const now = new Date();
        return {
          hm: now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
          s: String(now.getSeconds()).padStart(2, '0')
        }
      },
      clock: { hm: '', s: '' },
      isFullscreen: false,
      mouseFermo: false,
      mouseTimer: null,
      
      resetMouseTimer() {
        this.mouseFermo = false;
        clearTimeout(this.mouseTimer);
        this.mouseTimer = setTimeout(() => {
          if (this.isFullscreen) this.mouseFermo = true;
        }, 2000);
      },

      async proiettaSuSecondoSchermo() {
        try {
          if ('getScreenDetails' in window) {
            const screenDetails = await window.getScreenDetails();
            const secondaryScreen = screenDetails.screens.find(s => !s.isPrimary);
            
            if (secondaryScreen) {
              // Forza il fullscreen direttamente sul secondo schermo senza muovere prima la finestra
              await document.documentElement.requestFullscreen({ screen: secondaryScreen });
              return;
            }
          }
          await document.documentElement.requestFullscreen();
        } catch (err) {
          try { await document.documentElement.requestFullscreen(); } catch(e){}
        }
      }
    })"
    x-init="
      clock = getClockObj(); 
      setInterval(() => { clock = getClockObj() }, 1000);
      resetMouseTimer();
      document.addEventListener('fullscreenchange', () => {
        isFullscreen = !!document.fullscreenElement;
        if (!isFullscreen) mouseFermo = false;
      });
      proiettaSuSecondoSchermo();
    "
    @click="proiettaSuSecondoSchermo()"
    @mousemove="resetMouseTimer()"
    :class="{ 'hide-cursor': mouseFermo, 'justify-center gap-0': endMeetingMode, 'justify-between py-8': !endMeetingMode }"
    class="w-full h-dvh relative flex flex-col items-center cursor-pointer select-none transition-all text-neutral-100 overflow-hidden"
  >
    
    <!-- SUGGERIMENTO POPUP -->
    <div x-show="!isFullscreen" class="absolute top-4 left-4 z-50 text-xs text-neutral-500 bg-neutral-900/60 backdrop-blur-md px-3 py-1.5 border border-neutral-800 rounded pointer-events-none font-mono">
      💡 Clicca qui sul monitor principale per proiettare sul secondo schermo.
    </div>

    <!-- INTESTAZIONE TITOLO (SOLO SE NON È FINE ADUNANZA) -->
    <div x-show="!endMeetingMode" class="flex items-center justify-center text-center min-h-20 max-h-[20dvh] w-full px-8 font-timer shrink-0 overflow-hidden">
      <span
        class="text-4xl md:text-5xl lg:text-6xl xl:text-7xl font-bold tracking-wide uppercase transition-all leading-[1.1] max-w-6xl line-clamp-2"
        :class="[delay ? 'text-red-500 animate-pulse' : 'text-green-500']"
        x-text="delay ? 'TEMPO SCADUTO' : activeTimer?.name"
      ></span>
    </div>

    <!-- CASO STANDARD: SCADENZIARIO E BARRA -->
    <div x-show="!endMeetingMode" class="flex flex-col items-center justify-center w-full flex-grow gap-4 py-2">
      <div class="flex font-timer font-bold select-none items-baseline leading-none">
        <div :class="[delay ? 'text-red-500' : 'text-green-500']" class="text-[11vw] md:text-[140px] lg:text-[180px] xl:text-[220px] leading-none transition-colors" x-text="mins"></div>
        <div :class="[delay ? 'text-red-500' : 'text-green-500']" class="text-[9vw] md:text-[120px] lg:text-[150px] xl:text-[180px] leading-none px-2 transition-colors">:</div>
        <div :class="[delay ? 'text-red-500' : 'text-green-500']" class="text-[9vw] md:text-[120px] lg:text-[150px] xl:text-[180px] leading-none transition-colors" x-text="secs"></div>
      </div>

      <div class="w-8/12 rounded-full h-3 bg-neutral-900 border border-neutral-800 flex flex-row-reverse overflow-hidden mt-2">
        <div
          x-show="showBar"
          :class="[barValue === 0 ? 'bg-red-500' : 'bg-green-500']"
          class="h-full rounded-full transition-all duration-1000 ease-linear"
          :style="'width:' + [barValue === 0 ? 100 : barValue] + '%'"
        ></div>
      </div>
    </div>

    <!-- CASO FINE ADUNANZA: TITOLO ARANCIONE 400 + DIVISORE + OROLOGIO CHIARO -->
    <div x-show="endMeetingMode" class="flex flex-col items-center justify-center flex-grow gap-4 animate-fade-in">
      <!-- Scritta Buona Serata ridimensionata a una grandezza ottimale -->
      <div class="font-timer font-bold tracking-wider uppercase text-5xl md:text-7xl lg:text-8xl leading-none text-orange-400 text-center">
        BUONA SERATA
      </div>
      
      <!-- Linea di separazione orizzontale per dare l'effetto orologio -->
      <div class="w-4/5 max-w-xl border-t border-orange-400/30 my-2"></div>
      
      <!-- Cifre Orologio ben distinte -->
      <div class="flex items-baseline select-none font-mono font-bold tracking-widest">
        <span class="text-8xl md:text-9xl lg:text-[11rem] text-orange-400 tabular-nums leading-none" x-text="clock.hm"></span>
        <span class="text-7xl md:text-8xl lg:text-9xl mx-6 text-orange-400/50 leading-none">:</span>
        <span class="text-6xl md:text-7xl lg:text-8xl w-[100px] md:w-[130px] text-left text-orange-400/80 tabular-nums leading-none" x-text="clock.s"></span>
      </div>
    </div>

    <!-- BOTTOM BAR OROLOGIO ANGOLARE (MANTIENE IL COLORE ARANCIONE 400) -->
    <div x-show="!endMeetingMode" class="w-full flex justify-end items-end px-12 pb-6 shrink-0">
      <div class="relative bg-black px-8 py-4 border border-orange-400/40 rounded-xl flex items-center select-none font-mono font-bold tracking-wider gap-4 outline outline-2 outline-orange-950/20 outline-offset-2">
        
        <!-- Micro Icona Orologio a Sinistra -->
        <div class="text-orange-400/70 shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.2" stroke="currentColor" class="w-8 h-8 lg:w-10 lg:h-10">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
          </svg>
        </div>

        <div class="flex items-baseline">
          <span class="text-5xl md:text-6xl lg:text-7xl text-orange-400 tabular-nums leading-none" x-text="clock.hm"></span>
          <span class="text-4xl md:text-5xl lg:text-6xl mx-2 text-orange-400/30 leading-none">:</span>
          <span class="text-3xl md:text-4xl lg:text-5xl w-[50px] md:w-[65px] text-left text-orange-400/60 tabular-nums leading-none" x-text="clock.s"></span>
        </div>
      </div>
    </div>

  </body>
</html>
