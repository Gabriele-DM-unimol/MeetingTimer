<!DOCTYPE html>
<html lang="it">
  <head>
    <title>Timer Client</title>
    <link rel="icon" type="image/x-icon" href="../favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">

    <script type="text/javascript" src="client3.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/sort@3.14.8/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/focus@3.14.8/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <style>
      .font-timer { font-family: 'Oswald', sans-serif; }
      .hide-cursor { cursor: none !important; }
      body { background-color: #0a0a0a; user-select: none; }
    </style>
  </head>
  <body 
    x-data="Object.assign(client(), { 
      getClockObj() {
        const now = new Date();
        return {
          hm: now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
          s: String(now.getSeconds()).padStart(2, '0')
        }
      },
      clock: { hm: '', s: '' },
      isFullscreen: false,
      mouseFermo: false,
      mouseTimer: null,
      
      resetMouseTimer() {
        this.mouseFermo = false;
        clearTimeout(this.mouseTimer);
        this.mouseTimer = setTimeout(() => {
          if (this.isFullscreen) this.mouseFermo = true;
        }, 2000);
      },

      async proiettaSuSecondoSchermo() {
        try {
          if ('getScreenDetails' in window) {
            const screenDetails = await window.getScreenDetails();
            const secondaryScreen = screenDetails.screens.find(s => !s.isPrimary);
            
            if (secondaryScreen) {
              // Forza il fullscreen direttamente sul secondo schermo senza muovere prima la finestra
              await document.documentElement.requestFullscreen({ screen: secondaryScreen });
              return;
            }
          }
          await document.documentElement.requestFullscreen();
        } catch (err) {
          try { await document.documentElement.requestFullscreen(); } catch(e){}
        }
      }
    })"
    x-init="
      clock = getClockObj(); 
      setInterval(() => { clock = getClockObj() }, 1000);
      resetMouseTimer();
      document.addEventListener('fullscreenchange', () => {
        isFullscreen = !!document.fullscreenElement;
        if (!isFullscreen) mouseFermo = false;
      });
      proiettaSuSecondoSchermo();
    "
    @click="proiettaSuSecondoSchermo()"
    @mousemove="resetMouseTimer()"
    :class="{ 'hide-cursor': mouseFermo, 'justify-center gap-16': endMeetingMode, 'justify-between py-8': !endMeetingMode }"
    class="w-full h-dvh relative flex flex-col items-center cursor-pointer select-none transition-all text-neutral-100 overflow-hidden"
  >
    
    <!-- SUGGERIMENTO POPUP -->
    <div x-show="!isFullscreen" class="absolute top-4 left-4 z-50 text-xs text-neutral-500 bg-neutral-900/60 backdrop-blur-md px-3 py-1.5 border border-neutral-800 rounded pointer-events-none font-mono">
      💡 Clicca qui sul monitor principale per proiettare sul secondo schermo.
    </div>

    <!-- INTESTAZIONE TITOLO -->
    <div class="flex items-center justify-center text-center h-20 w-full px-4 font-timer shrink-0">
      <span
        class="text-5xl md:text-6xl lg:text-8xl font-bold tracking-wide uppercase transition-all"
        :class="[endMeetingMode ? 'text-slate-400 font-medium tracking-widest' : (delay ? 'text-red-500 animate-pulse' : 'text-green-500')]"
        x-text="endMeetingMode ? 'BUONA SERATA' : (delay ? 'TEMPO SCADUTO' : activeTimer?.name)"
      ></span>
    </div>
    
    <!-- CASO STANDARD: SCADENZIARIO E BARRA -->
    <div x-show="!endMeetingMode" class="flex flex-col items-center justify-center w-full flex-grow gap-8">
      <div class="flex font-timer font-bold select-none items-baseline">
        <div :class="[delay ? 'text-red-500' : 'text-green-500']" class="text-[16vw] leading-none transition-colors" x-text="mins"></div>
        <div :class="[delay ? 'text-red-500' : 'text-green-500']" class="text-[14vw] leading-none px-4 transition-colors">:</div>
        <div :class="[delay ? 'text-red-500' : 'text-green-500']" class="text-[14vw] leading-none transition-colors" x-text="secs"></div>
      </div>
      
      <div class="w-9/12 rounded-full h-3 bg-neutral-900 border border-neutral-800 flex flex-row-reverse overflow-hidden">
        <div
          x-show="showBar"
          :class="[barValue === 0 ? 'bg-red-500' : 'bg-green-500']"
          class="h-full rounded-full transition-all duration-1000 ease-linear"
          :style="'width:' + [barValue === 0 ? 100 : barValue] + '%'"
        ></div>
      </div>
    </div>

    <!-- CASO FINE ADUNANZA: MAXI OROLOGIO CENTRATO -->
    <div x-show="endMeetingMode" class="flex items-center justify-center flex-grow">
      <div class="bg-neutral-900/40 backdrop-blur-md px-16 py-10 border border-neutral-800 rounded-3xl flex items-baseline select-none font-mono font-bold tracking-tight shadow-2xl">
        <span class="text-7xl md:text-8xl lg:text-9xl text-slate-400 tabular-nums leading-none" x-text="clock.hm"></span>
        <span class="text-6xl md:text-7xl lg:text-8xl mx-4 text-slate-500/40 leading-none">:</span>
        <span class="text-5xl md:text-6xl lg:text-7xl w-[85px] md:w-[110px] text-left text-slate-500/60 tabular-nums leading-none" x-text="clock.s"></span>
      </div>
    </div>

    <!-- BOTTOM BAR OROLOGIO ANGOLARE -->
    <div x-show="!endMeetingMode" class="w-full flex justify-end items-end px-12 pb-4 shrink-0">
      <div class="bg-neutral-900/50 backdrop-blur-md px-8 py-4 border border-neutral-800 rounded-2xl flex items-baseline select-none font-mono font-bold tracking-tight shadow-2xl">
        <span class="text-6xl md:text-7xl lg:text-8xl text-slate-400 tabular-nums leading-none" x-text="clock.hm"></span>
        <span class="text-5xl md:text-6xl lg:text-7xl mx-2 text-slate-500/60 leading-none">:</span>
        <span class="text-4xl md:text-5xl lg:text-6xl w-[55px] md:w-[70px] text-left text-slate-500/80 tabular-nums leading-none" x-text="clock.s"></span>
      </div>
    </div>

  </body>
</html>
