<!DOCTYPE html>
<html lang="it">
  <head>
    <title>Timer Admin</title>
    <link class="sub-icon" rel="icon" type="image/x-icon" href="../favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">

    <script type="text/javascript" src="admin3.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/focus@3.14.8/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <style>
      .font-timer { font-family: 'Oswald', sans-serif; }
    </style>
  </head>
  <body x-data="Object.assign(admin(), {
      getClockObj() {
        const now = new Date();
        return {
          hm: now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
          s: String(now.getSeconds()).padStart(2, '0')
        }
      },
      clock: { hm: '', s: '' },
      initClock() {
        this.clock = this.getClockObj();
        setInterval(() => { this.clock = this.getClockObj() }, 1000);
      }
    })" 
    x-init="initClock();" 
    class="bg-neutral-950 text-neutral-100 min-h-dvh select-none"
  >
    <template x-if="!loading">
      <div class="flex flex-col lg:flex-row w-full min-h-dvh justify-between gap-3 p-2 lg:p-0">
        
        <!-- PANNELLO DI CONTROLLO (SINISTRA) -->
        <div class="w-full lg:w-1/2 p-3 pb-6 h-auto lg:h-dvh lg:overflow-y-auto order-2 lg:order-1">
          <div class="sticky top-0 z-10 bg-neutral-950 pb-4 border-b border-neutral-800">
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 pt-3">
              <div class="flex flex-col gap-1">
                <label class="pl-0.5 text-xs text-neutral-400">Inizio [ reale: <strong x-text="effectiveStart" class="text-green-500"></strong> ]</label>
                <input type="time" x-model="conferenceStartVal" :disabled="isTimerActive || endMeetingMode" @input="setEndAuto()" class="w-full min-h-[44px] rounded border border-neutral-700 bg-neutral-900 px-3 py-2 text-sm focus:outline-none focus:border-green-500 disabled:opacity-50" />
              </div>
              <div class="flex flex-col gap-1">
                <label class="pl-0.5 text-xs text-neutral-400">Fine [ prevista: <strong x-text="calculatedEnd" class="text-green-500"></strong> ]</label>
                <input type="time" x-model="conferenceEndVal" :disabled="isTimerActive || endMeetingMode" @input="setStartAuto(); postTimers()" class="w-full min-h-[44px] rounded border border-neutral-700 bg-neutral-900 px-3 py-2 text-sm focus:outline-none focus:border-green-500 disabled:opacity-50" />
              </div>
              <div class="flex flex-col gap-1">
                <label class="pl-0.5 text-xs text-neutral-400">Template</label>
                <div class="relative">
                  <select id="template" x-model="selectedTemplateId" :disabled="isTimerActive || endMeetingMode" class="w-full min-h-[44px] rounded border border-neutral-700 bg-neutral-900 px-3 py-2 text-sm focus:outline-none focus:border-green-500 disabled:opacity-50 appearance-none">
                    <option selected disabled hidden>Seleziona...</option>
                    <template x-for="template in templates" :key="template.id">
                      <option :value="template.id" x-text="template.name"></option>
                    </template>
                  </select>
                </div>
              </div>
            </div>

            <!-- PULSANTI CONTROLLO -->
            <div class="grid grid-cols-5 gap-2 mt-4">
              <button type="button" :disabled="!isTimerActive || endMeetingMode" @click="back(); startCountdown(); postTimers()" class="min-h-[48px] flex items-center justify-center border border-neutral-700 bg-neutral-900 rounded active:bg-neutral-800 disabled:opacity-40 custom-touch-target">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="size-6 fill-white"><path d="m4.5 18.75 7.5-7.5 7.5 7.5M4.5 12.75l7.5-7.5 7.5 7.5"/></svg>
              </button>
              <button type="button" :disabled="isTimerActive || endMeetingMode" @click="applyTemplate()" class="min-h-[48px] flex items-center justify-center border border-neutral-700 bg-neutral-900 rounded active:bg-neutral-800 disabled:opacity-40 custom-touch-target">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="size-5 fill-white"><path d="M24 9h-9l3.364-3.364c-1.7-1.7-3.96-2.636-6.364-2.636s-4.664 0.936-6.364 2.636c-1.7 1.7-2.636 3.96-2.636 6.364s0.936 4.664 2.636 6.364c1.7 1.7 3.96 2.636 6.364 2.636s4.664-0.936 6.364-2.636c0.142-0.142 0.278-0.288 0.409-0.438l2.258 1.975c-2.2 2.512-5.43 4.098-9.031 4.098-6.627 0-12-5.373-12-12s5.373-12 12-12c3.314 0 6.313 1.344 8.485 3.515l3.515-3.515v9z"/></svg>
              </button>
              <button type="button" @click="next(); startCountdown(); postTimers()" :disabled="endMeetingMode" :class="[isTimerActive ? 'border-neutral-700':'border-green-500 bg-green-950/30']" class="min-h-[48px] flex items-center justify-center border bg-neutral-900 rounded active:bg-neutral-800 custom-touch-target disabled:opacity-40">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="size-6 fill-white"><path d="m4.5 5.25 7.5 7.5 7.5-7.5m-15 6 7.5 7.5 7.5-7.5"/></svg>
              </button>
              
              <button type="button" @click="apriFinestraClient()" class="min-h-[48px] text-[11px] px-1 font-medium flex flex-col items-center justify-center border border-amber-600 bg-amber-950/20 text-amber-400 rounded active:bg-amber-900/40 custom-touch-target transition-all">
                <span>Attiva</span>
                <span>2° schermo</span>
              </button>

              <button type="button" @click="toggleEndMeeting()" :class="[endMeetingMode ? 'border-blue-500 bg-blue-950 text-blue-400 font-bold' : 'border-neutral-700 bg-neutral-900 text-neutral-300']" class="min-h-[48px] text-[11px] px-1 flex items-center justify-center border rounded active:bg-neutral-800 custom-touch-target transition-all">
                Fine Adunanza
              </button>
            </div>
          </div>

          <!-- LISTA PROGRAMMA -->
          <div class="w-full mt-4 space-y-4">
            <!-- Timer Passati (Non Modificabili) -->
            <ul class="w-full space-y-2">
              <template x-for="timer in slicedTimers[0]" :key="timer.id">
                <li class="flex items-center justify-between p-2 border border-neutral-800 bg-neutral-900/40 opacity-70 rounded">
                  <input x-model="timer.name" disabled type="text" class="w-full text-base px-2 py-1 bg-transparent border-none text-neutral-400" />
                  <div class="px-2 py-1 text-xs font-mono text-neutral-500 flex items-center gap-1.5 shrink-0">
                    <span class="text-green-500 font-bold" x-text="'[' + getSecondsString(timer.duration) + ']'"></span>
                    <span x-text="'(prevista ' + getSecondsString(timer.maxDuration) + ')'"></span>
                  </div>
                </li>
              </template>
            </ul>
            <!-- Coda Timer Attivi/Futuri (Modificabili tramite Frecce con Animazione Fluida) -->
            <ul class="w-full space-y-2 relative">
              <template x-for="(timer, index) in slicedTimers[1]" :key="timer.id">
                <li :class="[
                      timer.active ? 'border-green-500 bg-green-950/10' : 'border-neutral-800 bg-neutral-900',
                      movingId === timer.id ? 'z-20 scale-[1.02] shadow-xl border-neutral-600 bg-neutral-800/80' : 'z-10'
                    ]" 
                    class="flex items-center gap-2 p-2 border rounded min-h-[54px] transition-all duration-300 cubic-bezier(0.25, 1, 0.5, 1)">
                  
                  <!-- SET DI FRECCE (SU / GIÙ) -->
                  <div class="flex flex-col justify-center items-center gap-0.5 shrink-0 min-w-[32px]">
                    <!-- Freccia SU -->
                    <button type="button" 
                            :disabled="timer.active || index === 0 || (index === 1 && isTimerActive)" 
                            @click="animateMove(index, 'up')"
                            class="p-1 text-neutral-400 hover:text-white disabled:opacity-15 active:scale-95 transition-all">
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="size-5"><path fill-rule="evenodd" d="M10 17a.75.75 0 0 1-.75-.75V5.612L5.29 9.58a.75.75 0 1 1-1.08-1.04l5.25-5.25a.75.75 0 0 1 1.08 0l5.25 5.25a.75.75 0 1 1-1.08 1.04L10.75 5.612V16.25A.75.75 0 0 1 10 17Z" clip-rule="evenodd" /></svg>
                    </button>
                    <!-- Freccia GIÙ -->
                    <button type="button" 
                            :disabled="timer.active || (index === 0 && isTimerActive) || index === slicedTimers[1].length - 1" 
                            @click="animateMove(index, 'down')"
                            class="p-1 text-neutral-400 hover:text-white disabled:opacity-15 active:scale-95 transition-all">
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="size-5"><path fill-rule="evenodd" d="M10 3a.75.75 0 0 1 .75.75v10.638l4.022-3.968a.75.75 0 1 1 1.05 1.07l-5.304 5.23a.75.75 0 0 1-1.036 0L4.178 11.49a.75.75 0 1 1 1.05-1.07l4.022 3.968V3.75A.75.75 0 0 1 10 3Z" clip-rule="evenodd" /></svg>
                    </button>
                  </div>

                  <!-- CONTENUTO DEL TIMER -->
                  <input x-model="timer.name" @change="postTimers()" type="text" class="w-full text-base px-2 py-1 bg-transparent border border-transparent focus:border-neutral-700 rounded text-white" />
                  <span class="px-2 py-1 text-sm font-mono bg-neutral-950 rounded text-neutral-400 min-w-[55px] text-center" x-text="getSecondsString(timer.duration || timer.maxDuration)"></span>
                  
                  <div class="flex items-center border border-neutral-700 rounded bg-neutral-950 overflow-hidden shrink-0">
                    <!-- PULSANTE MENO -->
                    <button type="button" :disabled="timer.active" x-on:click="timer.maxDuration = Math.max(60, timer.maxDuration - 60); timer.duration = timer.maxDuration; postTimers()" class="px-2 min-h-[36px] bg-neutral-900 active:bg-neutral-800 text-neutral-400 disabled:opacity-30 custom-touch-target">-</button>
                    
                    <!-- MINUTI CORRENTI -->
                    <span class="w-10 text-center text-sm font-mono font-bold text-green-500" x-text="Math.floor(timer.maxDuration / 60)"></span>
                    <!-- PULSANTE PIÙ -->
                    <button type="button" 
                      :disabled="timer.active || meetingInDelay" 
                      x-on:click="
                        let limiteMassimoSecondi = 105 * 60;

                        if (isTimerActive && timers[0]?.start) {
                          // 1. Recuperiamo lo start assoluto del primo timer (Inizio Reale dell'adunanza)
                          let inizioRealeMeeting = timers[0].start.getTime();
                          let orarioMassimoFine = inizioRealeMeeting + (limiteMassimoSecondi * 1000);

                          // 2. Calcoliamo la durata totale che l'adunanza avrebbe dopo questo incremento:
                          // - Per i passati (slicedTimers[0]): usiamo la loro 'duration' reale già consumata
                          let durataPassati = slicedTimers[0].reduce((sum, t) => sum + t.duration, 0);

                          // - Per i futuri/attivi (slicedTimers[1]): sommiamo le loro maxDuration nominali
                          //   aggiungendo già i 60 secondi al timer che stiamo cercando di incrementare
                          let durataFuturi = slicedTimers[1].reduce((sum, t) => sum + (t.id === timer.id ? t.maxDuration + 60 : t.maxDuration), 0);

                          let proiezioneFineMeeting = inizioRealeMeeting + ((durataPassati + durataFuturi) * 1000);

                          if (proiezioneFineMeeting > orarioMassimoFine) {
                            alert('Attenzione: Aumentando questa parte supereresti l\'orario massimo di chiusura (Inizio Reale + 105 minuti)!');
                            return;
                          }
                        } else {
                          // Se NON è ancora partito, usiamo il controllo standard sul cumulo delle maxDuration nominali
                          let sommaAttualeSecondi = timers.reduce((sum, t) => sum + (t.id === timer.id ? t.maxDuration + 60 : t.maxDuration), 0);
                          if (sommaAttualeSecondi > limiteMassimoSecondi) {
                            alert('Attenzione: Il totale delle parti configurate non può superare i 105 minuti!');
                            return;
                          }
                        }

                        timer.maxDuration = timer.maxDuration + 60; 
                        timer.duration = timer.maxDuration; 
                        postTimers();
                      " 
                      class="px-2 min-h-[36px] bg-neutral-900 active:bg-neutral-800 text-neutral-400 disabled:opacity-30 custom-touch-target">+</button>
                  </div>
                  
                  <button type="button" :disabled="timer.active" @click="deleteTimer(timer); postTimers()" class="p-2 text-red-500 hover:bg-red-950/30 active:bg-red-950/60 rounded disabled:opacity-20 custom-touch-target shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="size-5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg>
                  </button>
                </li>
              </template>
              <li class="w-full">
                <button type="button" @click="modalIsOpen = true" class="w-full min-h-[48px] flex justify-center items-center border border-dashed border-neutral-700 hover:border-neutral-500 rounded bg-neutral-900/20 text-neutral-400">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="size-6"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
                </button>
              </li>
            </ul>
          </div>
        </div>

        <!-- ANTEPRIMA REGIA SPECULARE AL CLIENT (DESTRA) -->
        <div class="w-full lg:w-1/2 h-[45dvh] lg:h-dvh overflow-hidden order-1 lg:order-2">
          <div :class="endMeetingMode ? 'justify-center gap-0' : 'justify-between py-6'" class="h-full border border-neutral-800 bg-[#0a0a0a] flex flex-col items-center p-4 rounded lg:rounded-none relative transition-all">
            
                <div x-show="!endMeetingMode" class="flex items-center justify-center text-center h-20 w-full px-4 font-timer shrink-0">
                  <span
                    class="text-3xl md:text-4xl lg:text-6xl font-bold tracking-wide uppercase transition-all"
                    :class="[delay ? 'text-red-500 animate-pulse' : 'text-green-500']"
                    x-text="delay ? 'TEMPO SCADUTO' : activeTimer?.name"
                  ></span>
                </div>
            
            <div x-show="!endMeetingMode" class="flex flex-col items-center justify-center w-full flex-grow gap-8">
                <div class="flex font-timer font-bold select-none items-baseline">
                <div :class="[delay ? 'text-red-500' : 'text-green-500']" class="text-[8vw] leading-none transition-colors" x-text="mins"></div>
                <div :class="[delay ? 'text-red-500' : 'text-green-500']" class="text-[6vw] leading-none px-4 transition-colors">:</div>
                <div :class="[delay ? 'text-red-500' : 'text-green-500']" class="text-[6vw] leading-none transition-colors" x-text="secs"></div>
                </div>
              
              <div class="w-9/12 rounded-full h-3 bg-neutral-900 border border-neutral-800 flex flex-row-reverse overflow-hidden">
                <div
                  x-show="showBar"
                  :class="[barValue === 0 ? 'bg-red-500' : 'bg-green-500']"
                  class="h-full rounded-full transition-all duration-1000 ease-linear"
                  :style="'width:' + [barValue === 0 ? 100 : barValue] + '%'"
                ></div>
              </div>
            </div>

            <div x-show="endMeetingMode" class="flex flex-col items-center justify-center flex-grow gap-2">
              <div class="font-timer font-bold tracking-wider uppercase text-4xl lg:text-6xl leading-none text-orange-400 text-center">
                BUONA SERATA
              </div>
              <div class="w-4/5 max-w-md border-t border-orange-400/30 my-2"></div>
              <div class="flex items-baseline select-none font-mono font-bold tracking-widest">
                <span class="text-6xl lg:text-8xl text-orange-400 tabular-nums leading-none" x-text="clock.hm"></span>
                <span class="text-5xl lg:text-7xl mx-3 text-orange-400/50 leading-none">:</span>
                <span class="text-4xl lg:text-6xl w-[50px] lg:w-[75px] text-left text-orange-400/80 tabular-nums leading-none" x-text="clock.s"></span>
              </div>
            </div>

            <div x-show="!endMeetingMode" class="w-full flex justify-end items-end px-4 pb-2 shrink-0">
              <div class="relative bg-black px-4 py-2 border border-orange-400/40 rounded-xl flex items-center select-none font-mono font-bold tracking-wider gap-2 outline outline-2 outline-orange-950/20 outline-offset-2">
                <div class="text-orange-400/70 shrink-0">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.2" stroke="currentColor" class="w-6 h-6 lg:w-7 lg:h-7">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                  </svg>
                </div>
                <div class="flex items-baseline">
                  <span class="text-2xl lg:text-3xl text-orange-400 tabular-nums leading-none" x-text="clock.hm"></span>
                  <span class="text-xl lg:text-2xl mx-1 text-orange-400/30 leading-none">:</span>
                  <span class="text-lg lg:text-xl w-[30px] text-left text-orange-400/60 tabular-nums leading-none" x-text="clock.s"></span>
                </div>
              </div>
            </div>

          </div>
        </div>

      </div>
    </template>

    <!-- MODALE -->
    <div x-cloak x-show="modalIsOpen" x-transition.opacity.duration.200ms x-trap.inert.noscroll="modalIsOpen" x-on:keydown.esc.window="modalIsOpen = false" class="fixed inset-0 z-50 flex items-center justify-center bg-black/70 p-4 backdrop-blur-md">
      <div @click.outside="modalIsOpen = false" class="w-full max-w-md flex flex-col gap-4 rounded-lg border border-neutral-800 bg-neutral-900 p-6 shadow-2xl">
        <div class="flex items-center justify-between border-b border-neutral-800 pb-3">
          <h3 class="text-lg font-semibold text-white">Aggiungi nuova parte</h3>
          <button @click="modalIsOpen = false" class="p-2 text-neutral-400 hover:text-white custom-touch-target"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="size-5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg></button>
        </div>
        <div class="space-y-4 py-2">
          <div class="flex flex-col gap-1">
            <label class="text-sm text-neutral-400">Nome parte</label>
            <input x-model="insertingName" type="text" class="w-full min-h-[44px] rounded border border-neutral-700 bg-neutral-950 px-3 py-2 text-sm text-white focus:outline-none focus:border-green-500" placeholder="Es. Discorso" />
          </div>
          <div class="flex flex-col gap-1">
            <label class="text-sm text-neutral-400">Durata (minuti)</label>
            <div class="flex items-center border border-neutral-700 rounded bg-neutral-950 overflow-hidden w-fit">
              <button type="button" @click="insertingDuration = Math.max(min, insertingDuration - 1)" class="px-4 min-h-[44px] bg-neutral-900 text-lg font-bold active:bg-neutral-800 text-neutral-300">-</button>
              <input x-model.number="insertingDuration" type="number" :max="max" :min="min" class="w-16 h-11 text-center bg-transparent border-none font-mono text-white font-bold" />
              <button type="button" @click="insertingDuration = Math.min(max, insertingDuration + 1)" class="px-4 min-h-[44px] bg-neutral-900 text-lg font-bold active:bg-neutral-800 text-neutral-300">+</button>
            </div>
          </div>
        </div>
        <div class="flex justify-end gap-3 pt-3 border-t border-neutral-800">
          <button @click="modalIsOpen = false" type="button" class="px-4 py-2 text-sm text-neutral-400 active:text-white">Annulla</button>
          <button @click="modalIsOpen = false; addTimer();" type="button" class="px-4 py-2 rounded bg-green-600 active:bg-green-700 text-white font-medium text-sm">Aggiungi</button>
        </div>
      </div>
    </div>
  </body>
</html>
